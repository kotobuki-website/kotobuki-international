<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts United Center — Kotobuki Seating International</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Noto Sans JP', 'Lato', sans-serif; background: #FFFFFF; color: #262626; line-height: 1.7; overflow-x: hidden; }
        :root {
            --navy: #304256; --gold: #4AB134; --white: #FFFFFF;
            --light-gray: #FAF9F5; --dark-gray: #3D5268;
            --text-light: #5A6B7D; --cool-gray: #EFF1F3; --text-dark: #262626;
        }
        h1,h2,h3,h4,h5,h6 { font-family: 'Noto Serif JP', Georgia, serif; font-weight: 400; line-height: 1.3; color: var(--navy); }

        /* Nav */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: var(--navy); padding: 0 40px;
            transition: all 0.3s ease; box-shadow: 0 2px 20px rgba(0,0,0,0.15);
        }
        nav { display: flex; align-items: center; justify-content: space-between; height: 70px; max-width: 1280px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { height: 36px; width: auto; }
        .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
        .logo-text .logo-main { font-family: 'Noto Serif JP', serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; color: #fff; text-transform: uppercase; }
        .logo-text .logo-sub { font-family: 'Lato', sans-serif; font-size: 0.58rem; font-weight: 300; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); text-transform: uppercase; }
        nav ul { list-style: none; display: flex; gap: 32px; align-items: center; }
        nav ul a { text-decoration: none; color: rgba(255,255,255,0.85); font-family: 'Lato', sans-serif; font-size: 0.85rem; letter-spacing: 0.06em; font-weight: 400; transition: color 0.2s; }
        nav ul a:hover { color: var(--gold); }
        .nav-portal > a { background: rgba(74,177,52,0.15); border: 1px solid rgba(74,177,52,0.4); border-radius: 4px; padding: 6px 14px !important; color: #7dda63 !important; font-weight: 600; }
        .nav-portal > a:hover { background: rgba(74,177,52,0.28); }

        /* Hero */
        .case-hero {
            padding: 140px 40px 80px;
            background: linear-gradient(135deg, var(--navy) 0%, #1e2d3d 100%);
            color: white;
        }
        .case-hero .container { max-width: 900px; margin: 0 auto; }
        .breadcrumb { font-family: 'Lato', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); margin-bottom: 1.2rem; }
